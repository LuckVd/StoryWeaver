appId: com.storyweaver.app
productName: StoryWeaver
directories:
  output: release
  buildResources: build
# main/preload 已 bundle 后端依赖(自包含),只需打出 electron 构建产物
files:
  - out/**/*
  - package.json
asar: true
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
